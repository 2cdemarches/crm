<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CRM Formalites - Connexion</title><link rel="stylesheet" href="/css/style.css"></head>
<body><div class="login-page"><div class="login-box">
<h1>CRM Formalites</h1><p>Espace collaborateur - Cabinet d expertise comptable</p>
<div id="alert" class="alert alert-error hidden"></div>
<form id="loginForm">
<div class="form-group"><label class="form-label">Email</label><input type="email" id="email" class="form-control" placeholder="votre@email.fr" required autofocus></div>
<div class="form-group"><label class="form-label">Mot de passe</label><input type="password" id="password" class="form-control" placeholder="..." required></div>
<button type="submit" class="btn btn-primary w-full" style="justify-content:center;margin-top:8px">Se connecter</button>
</form></div></div>
<script>
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const al = document.getElementById('alert'); al.classList.add('hidden');
  const res = await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('email').value,password:document.getElementById('password').value})});
  const data = await res.json();
  if(!res.ok){al.textContent=data.error;al.classList.remove('hidden');return;}
  window.location.href='/dashboard.html';
});
</script></body></html>
